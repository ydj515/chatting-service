spring:
  application:
    name: ${SPRING_APPLICATION_NAME:chat-application}

  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Seoul}

  # PostgreSQL 데이터베이스
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:chatdb}?autoCommit=false
    username: ${DB_USERNAME:chatuser}
    password: ${DB_PASSWORD:chatpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAXIMUM_POOL_SIZE:30}
      minimum-idle: ${DB_HIKARI_MINIMUM_IDLE:10}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_HIKARI_LEAK_DETECTION_THRESHOLD:60000}
      auto-commit: false

    # JPA 설정 (성능 최적화)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
          time_zone: ${APP_TIME_ZONE:Asia/Seoul}
        order_inserts: true
        order_updates: true
        cache:
          use_second_level_cache: false
          use_query_cache: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:30}
          max-idle: ${REDIS_POOL_MAX_IDLE:15}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}

    # 캐시 설정
  cache:
    type: redis
    redis:
      time-to-live: ${SPRING_CACHE_REDIS_TTL:30m}
      cache-null-values: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:300}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:20000}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}

# 로깅 설정
logging:
  level:
    com.chat: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cache: INFO
  pattern:
    console: "[%d{HH:mm:ss}] [${HOSTNAME:unknown}] %-5level %logger{36} - %msg%n"

# 액추에이터 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
      cors:
        allowed-origins: ${MANAGEMENT_CORS_ALLOWED_ORIGINS:*}
        allowed-methods: ${MANAGEMENT_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
        allowed-headers: ${MANAGEMENT_CORS_ALLOWED_HEADERS:*}
        max-age: ${MANAGEMENT_CORS_MAX_AGE:3600}
  endpoint:
    health:
      show-details: always

chat:
  auth:
    session:
      secret: ${CHAT_AUTH_SESSION_SECRET:local-development-session-secret-change-me}
      ttl: ${CHAT_AUTH_SESSION_TTL:12h}
      token-query-param: ${CHAT_AUTH_SESSION_TOKEN_QUERY_PARAM:token}
    web-socket-ticket:
      ttl: ${CHAT_AUTH_WEB_SOCKET_TICKET_TTL:30s}
      ticket-query-param: ${CHAT_AUTH_WEB_SOCKET_TICKET_QUERY_PARAM:ticket}
      key-prefix: ${CHAT_AUTH_WEB_SOCKET_TICKET_KEY_PREFIX:chat:ws-ticket:}
      rate-limit-key-prefix: ${CHAT_AUTH_WEB_SOCKET_TICKET_RATE_LIMIT_KEY_PREFIX:chat:ws-ticket:rate:}
      issue-rate-limit-window: ${CHAT_AUTH_WEB_SOCKET_TICKET_RATE_LIMIT_WINDOW:1m}
      issue-rate-limit-per-user: ${CHAT_AUTH_WEB_SOCKET_TICKET_RATE_LIMIT_PER_USER:10}
      issue-rate-limit-per-ip: ${CHAT_AUTH_WEB_SOCKET_TICKET_RATE_LIMIT_PER_IP:60}
      session-fallback-enabled: ${CHAT_AUTH_WEB_SOCKET_TICKET_SESSION_FALLBACK_ENABLED:false}
  api:
    cors:
      mapping: ${CHAT_API_CORS_MAPPING:/**}
      allowed-origins: ${CHAT_API_CORS_ALLOWED_ORIGINS:*}
      allowed-methods: ${CHAT_API_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
      allowed-headers: ${CHAT_API_CORS_ALLOWED_HEADERS:*}
      max-age: ${CHAT_API_CORS_MAX_AGE:3600}
  websocket:
    endpoint: ${CHAT_WEBSOCKET_ENDPOINT:/ws/chat}
    allowed-origins: ${CHAT_WEBSOCKET_ALLOWED_ORIGINS:*}
    user-id-attribute: ${CHAT_WEBSOCKET_USER_ID_ATTRIBUTE:userId}
    initial-chat-room-page-size: ${CHAT_WEBSOCKET_INITIAL_CHAT_ROOM_PAGE_SIZE:100}
    gateway:
      outbound-queue-max-pending-messages: ${CHAT_WEBSOCKET_GATEWAY_OUTBOUND_QUEUE_MAX_PENDING_MESSAGES:128}
      outbound-executor-threads: ${CHAT_WEBSOCKET_GATEWAY_OUTBOUND_EXECUTOR_THREADS:32}
      outbound-send-time-limit-millis: ${CHAT_WEBSOCKET_GATEWAY_OUTBOUND_SEND_TIME_LIMIT_MILLIS:10000}
      outbound-send-buffer-size-limit-bytes: ${CHAT_WEBSOCKET_GATEWAY_OUTBOUND_SEND_BUFFER_SIZE_LIMIT_BYTES:524288}
  redis:
    sequence-key-prefix: ${CHAT_REDIS_SEQUENCE_KEY_PREFIX:chat:sequence}
    server-rooms-key-prefix: ${CHAT_REDIS_SERVER_ROOMS_KEY_PREFIX:chat:server:rooms:}
    room-topic-prefix: ${CHAT_REDIS_ROOM_TOPIC_PREFIX:chat.room.}
    membership-topic: ${CHAT_REDIS_MEMBERSHIP_TOPIC:chat.membership}
    broker:
      server-id: ${HOSTNAME:}
      cleanup-initial-delay: ${CHAT_REDIS_BROKER_CLEANUP_INITIAL_DELAY:30s}
      processed-message-ttl: ${CHAT_REDIS_BROKER_PROCESSED_MESSAGE_TTL:1m}
      processed-message-max-size: ${CHAT_REDIS_BROKER_PROCESSED_MESSAGE_MAX_SIZE:10000}
    streams:
      room-stream-key-prefix: ${CHAT_REDIS_STREAMS_ROOM_STREAM_KEY_PREFIX:chat:stream:room:}
      known-streams-key: ${CHAT_REDIS_STREAMS_KNOWN_STREAMS_KEY:chat:stream:rooms}
      dead-letter-stream-key-prefix: ${CHAT_REDIS_STREAMS_DEAD_LETTER_STREAM_KEY_PREFIX:chat:stream:dlq:}
      shard-count: ${CHAT_REDIS_STREAMS_SHARD_COUNT:1}
  worker:
    roles: ${WORKER_ROLES:message-writer,fanout,search-projection,archive}
    consumer-name: ${HOSTNAME:worker-local}
    poll-delay-millis: ${CHAT_WORKER_POLL_DELAY_MILLIS:100}
    writer:
      consumer-group: ${CHAT_WORKER_WRITER_CONSUMER_GROUP:message-writer}
      read-count: ${CHAT_WORKER_WRITER_READ_COUNT:100}
      min-idle-millis: ${CHAT_WORKER_WRITER_MIN_IDLE_MILLIS:30000}
      max-delivery-count: ${CHAT_WORKER_WRITER_MAX_DELIVERY_COUNT:5}
    fanout:
      consumer-group: ${CHAT_WORKER_FANOUT_CONSUMER_GROUP:fanout}
      read-count: ${CHAT_WORKER_FANOUT_READ_COUNT:100}
      min-idle-millis: ${CHAT_WORKER_FANOUT_MIN_IDLE_MILLIS:30000}
      max-delivery-count: ${CHAT_WORKER_FANOUT_MAX_DELIVERY_COUNT:5}
  message:
    sequence:
      ttl: ${CHAT_MESSAGE_SEQUENCE_TTL:24h}
      block-size: ${CHAT_MESSAGE_SEQUENCE_BLOCK_SIZE:1000}
    pagination:
      max-limit: ${CHAT_MESSAGE_PAGINATION_MAX_LIMIT:100}
      default-limit: ${CHAT_MESSAGE_PAGINATION_DEFAULT_LIMIT:50}
      default-direction: ${CHAT_MESSAGE_PAGINATION_DEFAULT_DIRECTION:BEFORE}
  cache:
    default-ttl: ${CHAT_CACHE_DEFAULT_TTL:30m}
    users-ttl: ${CHAT_CACHE_USERS_TTL:1h}
    chat-rooms-ttl: ${CHAT_CACHE_CHAT_ROOMS_TTL:15m}
    chat-room-members-ttl: ${CHAT_CACHE_CHAT_ROOM_MEMBERS_TTL:10m}
    messages-ttl: ${CHAT_CACHE_MESSAGES_TTL:5m}
