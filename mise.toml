[tools]
java = "21.0.2"
gradle = "8.14.5"
node = "24.13.0"

[task_config]
dir = "{{ config_root }}"

# ============================================================
# 기본 명령 = 로컬 개발 환경
#   mise run            → 인프라(도커) + 백엔드(gradle bootRun) + 클라이언트
#                         이미지 빌드 없이 코드 변경이 바로 반영되는 일상 개발용
#   mise run start      → 전체 도커 클러스터(이미지 빌드 + nginx + 멀티 인스턴스)
#                         = 최종/통합 빌드 검증용
# ============================================================

[tasks.default]
description = "로컬 개발 환경을 기동한다. (= mise run dev)"
run = [
  { task = "dev" },
]

# ---------- setup ----------

[tasks.setup]
description = "개발 도구 설치 후 클라이언트 의존성을 설치한다."
run = [
  { task = "setup:tools" },
  { tasks = ["setup:client", "setup:client-admin"] },
]

[tasks."setup:tools"]
description = "mise.toml에 정의된 개발 도구를 설치한다."
run = "mise install"

[tasks."setup:client"]
description = "일반 사용자 클라이언트 의존성을 lockfile 기준으로 설치한다."
dir = "client"
run = "npm ci"

[tasks."setup:client-admin"]
description = "관리자 클라이언트 의존성을 lockfile 기준으로 설치한다."
dir = "client-admin"
run = "npm ci"

# ---------- dev (로컬 개발: 인프라=도커, 백엔드=gradle, 클라이언트=dev 서버) ----------

[tasks.dev]
description = "인프라·nginx는 도커로, 백엔드 4종은 gradle bootRun으로, 클라이언트까지 한 번에 띄운다. (이미지 빌드 없음)"
run = [
  { tasks = [
    "dev:api",
    "dev:websocket",
    "dev:worker",
    "dev:admin",
    "dev:nginx",
    "start:client",
    "dev:client-admin",
  ] },
]

[tasks."dev:nginx"]
description = "dev용 nginx(:80)를 기동해 /api 요청을 호스트 백엔드(8080~8082)로 라우팅한다."
run = "docker compose --profile dev up -d nginx-dev"

[tasks."dev:client-admin"]
description = "관리자 클라이언트 dev 서버를 실행한다. (/api → 게이트웨이 프록시, :5174)"
dir = "client-admin"
run = "npm run dev"

[tasks."dev:api"]
description = "chat-api를 도커 인프라에 붙여 호스트(JDK 21)에서 실행한다. (:8080)"
depends = ["start:infra"]
env = { SPRING_PROFILES_ACTIVE = "docker", DB_HOST = "localhost", DB_READ_HOST = "localhost", REDIS_HOST = "localhost", SERVER_PORT = "8080" }
run = "./gradlew :chat-api-application:bootRun"

[tasks."dev:websocket"]
description = "chat-websocket을 호스트(JDK 21)에서 실행한다. (:8081)"
depends = ["start:infra"]
env = { SPRING_PROFILES_ACTIVE = "docker", DB_HOST = "localhost", DB_READ_HOST = "localhost", REDIS_HOST = "localhost", SERVER_PORT = "8081" }
run = "./gradlew :chat-websocket-application:bootRun"

[tasks."dev:admin"]
description = "chat-admin을 호스트(JDK 21)에서 실행한다. (:8082)"
depends = ["start:infra"]
# CHAT_ADMIN_TOKEN은 docker 프로파일에서 필수값(@NotBlank)이므로 로컬 dev용 기본값을 여기서 주입한다.
env = { SPRING_PROFILES_ACTIVE = "docker", DB_HOST = "localhost", DB_READ_HOST = "localhost", REDIS_HOST = "localhost", SERVER_PORT = "8082", CHAT_ADMIN_TOKEN = "my-secure-admin-token-change-me" }
run = "./gradlew :chat-admin-application:bootRun"

[tasks."dev:worker"]
description = "chat-worker를 호스트(JDK 21)에서 실행한다. (:8083)"
depends = ["start:infra"]
env = { SPRING_PROFILES_ACTIVE = "docker", DB_HOST = "localhost", DB_READ_HOST = "localhost", REDIS_HOST = "localhost", SERVER_PORT = "8083" }
run = "./gradlew :chat-worker-application:bootRun"

[tasks."start:infra"]
description = "로컬 개발용 PostgreSQL primary/read-replica, partition archive worker, Redis를 기동한다."
run = "docker compose --profile dev up -d postgres postgres-primary-setup postgres-replica postgres-partition-archive redis"

[tasks."start:client"]
description = "일반 사용자 클라이언트 개발 서버를 실행한다."
dir = "client"
run = "npm start"

[tasks."start:client-admin"]
description = "관리자 클라이언트 개발 서버를 실행한다. (:5174)"
dir = "client-admin"
run = "npm start"

# ---------- start (전체 도커 클러스터: 이미지 빌드 + nginx + 멀티 인스턴스) ----------

[tasks.start]
description = "이미지를 빌드해 전체 도커 클러스터(nginx·멀티 인스턴스 포함)와 클라이언트를 기동한다. 통합/최종 검증용."
run = [
  { task = "start:backend" },
  { tasks = ["start:client", "start:client-admin"] },
]

[tasks."start:backend"]
description = "Docker Compose 백엔드 클러스터를 빌드 및 기동한다."
run = '''
#!/usr/bin/env bash
set -euo pipefail

docker compose --profile cluster up -d --build --wait --wait-timeout 180
docker compose restart nginx
docker compose --profile cluster up -d --wait --wait-timeout 60 nginx
'''

[tasks."restart:nginx"]
description = "nginx를 재시작해 upstream DNS를 갱신한다."
run = "docker compose restart nginx"

# ---------- build (산출물 빌드) ----------

[tasks.build]
description = "백엔드와 클라이언트를 모두 빌드한다."
run = [
  { tasks = ["build:backend", "build:client", "build:client-admin"] },
]

[tasks."build:backend"]
description = "Gradle 백엔드를 빌드한다."
run = "./gradlew clean build --no-daemon"

[tasks."build:client"]
description = "일반 사용자 클라이언트 프로덕션 빌드를 실행한다."
dir = "client"
run = "npm run build"

[tasks."build:client-admin"]
description = "관리자 클라이언트 프로덕션 빌드를 실행한다."
dir = "client-admin"
run = "npm run build"

# ---------- test / check ----------

[tasks.test]
description = "전체 테스트를 실행한다."
run = [
  { task = "test:backend" },
]

[tasks."test:backend"]
description = "Gradle 백엔드 테스트를 실행한다."
run = "./gradlew test --no-daemon"

[tasks.check]
description = "빠른 로컬 검증을 실행한다."
run = [
  { task = "test:backend" },
  { task = "verify:compose" },
]

[tasks."check:ci"]
description = "CI 수준의 전체 빌드와 검증을 실행한다."
run = [
  { task = "build" },
  { task = "verify:compose" },
]

# ---------- verify ----------

[tasks."verify:compose"]
description = "Docker Compose 설정 파일을 검증한다."
run = "docker compose --profile cluster --profile dev config --quiet"

[tasks."verify:postgres-replica"]
description = "PostgreSQL primary/read-replica와 partition archive worker 구성을 검증한다."
run = '''
#!/usr/bin/env bash
set -euo pipefail

docker compose up -d postgres postgres-primary-setup postgres-replica postgres-partition-archive

docker compose exec -T postgres \
  psql -U "${DB_USERNAME:-chatuser}" -d "${DB_NAME:-chatdb}" \
  -Atc "select usename,state,sync_state from pg_stat_replication;"

docker compose exec -T postgres-replica \
  psql -U "${DB_USERNAME:-chatuser}" -d "${DB_NAME:-chatdb}" \
  -Atc "select pg_is_in_recovery(), to_regclass('public.chat_messages') is not null;"

docker compose run --rm \
  -e CHAT_PARTITION_ARCHIVE_RUN_ONCE=true \
  postgres-partition-archive
'''

[tasks."verify:chat"]
description = "실행 중인 채팅 클러스터의 REST, WebSocket, 메시지 저장 흐름을 검증한다."
run = "node scripts/verify-chat.mjs"

# ---------- ops ----------

[tasks.ps]
description = "Docker Compose 서비스 상태를 확인한다."
run = "docker compose ps"

[tasks.logs]
description = "전체 Docker Compose 로그를 팔로우한다."
run = "docker compose logs -f --tail=200"

[tasks.stop]
description = "Docker Compose 서비스를 중지한다."
run = "docker compose down"

[tasks."clean:infra"]
description = "Docker Compose 서비스와 볼륨을 함께 제거한다."
confirm = "Docker 볼륨까지 삭제합니다. 로컬 DB 데이터가 사라질 수 있습니다. 계속할까요?"
run = "docker compose down --volumes --remove-orphans"
