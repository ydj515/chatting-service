<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3366FF" />
    <meta name="description" content="분산 채팅 시스템 React 관리자 클라이언트" />
    <title>Chat Admin</title>
    <script>
      // 테마 초기화 — 플래시 방지를 위해 앱 렌더 전에 dark 클래스를 설정
      (function () {
        try {
          var t = localStorage.getItem('admin_theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage 비활성 환경은 무시
        }
      })();
    </script>
  </head>
  <body>
    <noscript>이 앱을 실행하려면 JavaScript를 활성화해야 합니다.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
