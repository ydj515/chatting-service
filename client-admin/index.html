<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Admin</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script>
      // 테마 초기화 — 플래시 방지를 위해 body 렌더 전에 data-theme 설정
      (function () {
        try {
          var t = localStorage.getItem('admin_theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!-- base-url 기본값 주입 지점. build.mjs가 ADMIN_DEFAULT_BASE_URL 값으로 토큰을 치환한다.
         빈 값이면 adminState가 상대경로 '/api'로 폴백한다. -->
    <script>
      window.__ADMIN_DEFAULT_BASE_URL__ = '%%ADMIN_DEFAULT_BASE_URL%%';
    </script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>Chat Admin</h1>
        <div class="topbar-actions">
          <div id="notice" class="notice">Ready</div>
          <button id="theme-toggle" class="icon-toggle" type="button" aria-label="테마 변경" title="테마 변경">
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2" />
              <path d="M12 2.5v2.4M12 19.1v2.4M4.6 4.6l1.7 1.7M17.7 17.7l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.6 19.4l1.7-1.7M17.7 6.3l1.7-1.7" />
            </svg>
          </button>
        </div>
      </header>

      <main class="layout">
        <form id="admin-form" class="controls">
          <!-- 핵심 필드 — 검색/조회에 바로 필요한 항목 -->
          <div class="control-grid">
            <label>
              <span class="label-row">
                API Base URL
                <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="백엔드 API의 기본 경로입니다. 기본값은 /api 이며, 다른 호스트를 보려면 전체 URL을 입력하세요."></span>
              </span>
              <input id="base-url" name="baseUrl" autocomplete="off" />
            </label>
            <label>
              <span class="label-row">
                Admin Token
                <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="관리자 인증 토큰입니다. 어드민 API 호출 시 인증 헤더로 전송되며, 없으면 401이 발생합니다."></span>
              </span>
              <input id="admin-token" name="adminToken" type="password" autocomplete="off" />
            </label>
            <label>
              <span class="label-row">
                Room ID
                <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="조회할 채팅방의 숫자 ID입니다. Room Status와 Room History가 이 방을 대상으로 합니다."></span>
              </span>
              <input id="room-id" name="roomId" inputmode="numeric" />
            </label>
            <label>
              <span class="label-row">
                Query
                <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="검색어입니다. Message Search에서 메시지 본문을 검색합니다. 비우면 검색 결과가 없습니다."></span>
              </span>
              <input id="query" name="query" autocomplete="off" />
            </label>
            <label>
              <span class="label-row">
                Search Mode
                <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="검색 방식입니다. FTS는 전문(Full-Text) 검색 인덱스를 사용해 빠르고, CONTAINS는 단순 부분 문자열 매칭입니다."></span>
              </span>
              <select id="search-mode" name="searchMode">
                <option value="FTS">FTS</option>
                <option value="CONTAINS">CONTAINS</option>
              </select>
            </label>
          </div>

          <!-- 상세 필터 — 기본 접힘 -->
          <details class="advanced-filters">
            <summary>
              <span class="advanced-chevron" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </span>
              상세 필터
              <span id="advanced-badge" class="advanced-badge" hidden aria-label="적용된 상세 필터 개수">0</span>
            </summary>
            <div class="control-grid advanced-grid">
              <label>
                <span class="label-row">
                  Sender ID
                  <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="특정 보낸 사람(사용자 ID)으로 결과를 좁힙니다. 비우면 모든 발신자를 포함합니다."></span>
                </span>
                <input id="sender-id" name="senderId" inputmode="numeric" />
              </label>
              <label class="label-wide">
                <span class="label-row">
                  From
                  <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="조회 시작 시각입니다. 이 시각 이후에 생성된 메시지만 포함합니다."></span>
                </span>
                <input id="from" name="from" type="datetime-local" />
              </label>
              <label class="label-wide">
                <span class="label-row">
                  To
                  <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="조회 종료 시각입니다. 이 시각 이전에 생성된 메시지만 포함합니다."></span>
                </span>
                <input id="to" name="to" type="datetime-local" />
              </label>
              <label>
                <span class="label-row">
                  Limit
                  <span class="help" tabindex="0" role="img" aria-label="도움말" data-tip="한 번에 가져올 최대 행 수입니다. 기본값은 50입니다."></span>
                </span>
                <input id="limit" name="limit" inputmode="numeric" value="50" />
              </label>
            </div>
          </details>

          <!-- 적용 중인 상세 필터 — 개별 칩으로 표시, X로 제거 -->
          <div id="active-filters" class="chips-row" hidden></div>

          <div class="control-actions">
            <button id="export-button" class="secondary" type="button">Create Export</button>
            <button type="submit">Refresh</button>
          </div>
        </form>

        <section class="content">
          <section class="panel">
            <div class="panel-header">
              <h2>Room Status</h2>
            </div>
            <div id="status-grid" class="metrics"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Room History</h2>
              <span id="history-latency" class="latency">0ms</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Seq</th>
                    <th>Message ID</th>
                    <th>Sender</th>
                    <th>Type</th>
                    <th>Content</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody id="history-body"></tbody>
              </table>
            </div>
            <div class="panel-actions">
              <button id="history-next" class="secondary" type="button" disabled>Next</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Message Search</h2>
              <span id="search-latency" class="latency">0ms</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Seq</th>
                    <th>Message ID</th>
                    <th>Sender</th>
                    <th>Type</th>
                    <th>Content</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody id="search-body"></tbody>
              </table>
            </div>
            <div class="panel-actions">
              <button id="search-next" class="secondary" type="button" disabled>Next</button>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="./src/main.mjs"></script>
  </body>
</html>
