upstream chat_api_backend {
    server chat-api-app-1:${CHAT_BACKEND_PORT};
    server chat-api-app-2:${CHAT_BACKEND_PORT};
}

upstream chat_websocket_backend {
    server chat-websocket-app-1:${CHAT_BACKEND_PORT};
    server chat-websocket-app-2:${CHAT_BACKEND_PORT};
}

upstream chat_admin_backend {
    server chat-admin-app-1:${CHAT_BACKEND_PORT};
}

client_max_body_size 10m;

log_format chat_upstream '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent" "$http_x_forwarded_for" '
                         'upstream="$upstream_addr" upstream_status="$upstream_status" '
                         'request_time="$request_time" upstream_response_time="$upstream_response_time"';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;
    access_log /var/log/nginx/access.log chat_upstream;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/ws/ {
        proxy_pass http://chat_websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/admin/ {
        proxy_pass http://chat_admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://chat_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
