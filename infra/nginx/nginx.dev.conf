# 로컬 개발용 nginx 설정.
# 백엔드를 도커 이미지로 굽지 않고 호스트에서 gradle bootRun으로 띄우는 dev 모드를 위해,
# upstream을 컨테이너 이름이 아닌 host.docker.internal의 호스트 포트(8080~8082)로 지정한다.
# (prod/통합용 설정은 nginx.conf — 컨테이너 이름 + 멀티 인스턴스)
#
# 포트 매핑은 mise.toml dev:* 태스크의 SERVER_PORT와 일치해야 한다.
#   chat-api       :8080
#   chat-websocket :8081
#   chat-admin     :8082

upstream chat_api_backend {
    server host.docker.internal:8080;
}

upstream chat_websocket_backend {
    server host.docker.internal:8081;
}

upstream chat_admin_backend {
    server host.docker.internal:8082;
}

client_max_body_size 10m;

log_format chat_upstream '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent" "$http_x_forwarded_for" '
                         'upstream="$upstream_addr" upstream_status="$upstream_status" '
                         'request_time="$request_time" upstream_response_time="$upstream_response_time"';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;
    access_log /var/log/nginx/access.log chat_upstream;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/ws/ {
        proxy_pass http://chat_websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/admin/ {
        proxy_pass http://chat_admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://chat_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
