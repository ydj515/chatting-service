global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/smoke-rules/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: alertmanager
    metrics_path: /metrics
    static_configs:
      - targets: ["alertmanager:9093"]
        labels: { role: alertmanager }
