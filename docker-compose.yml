x-chat-app-build: &chat-app-build
  context: .
  args:
    APP_PORT: ${SERVER_PORT:-8080}
    APP_MODULE: ${APP_MODULE:-chat-application}

x-chat-app-environment: &chat-app-environment
  TZ: ${TZ:-Asia/Seoul}
  APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Seoul}
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker,redis-cluster}
  SERVER_PORT: ${SERVER_PORT:-8080}
  SERVER_CONTEXT_PATH: ${SERVER_CONTEXT_PATH:-/api}
  DB_HOST: postgres
  DB_READ_HOST: postgres-replica
  DB_PORT: ${DB_PORT:-5432}
  DB_READ_PORT: ${DB_READ_PORT:-5432}
  DB_NAME: ${DB_NAME:-chatdb}
  DB_USERNAME: ${DB_USERNAME:-chatuser}
  DB_PASSWORD: ${DB_PASSWORD:-chatpass}
  REDIS_HOST: redis
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-redis-cluster-node-1:6379,redis-cluster-node-2:6379,redis-cluster-node-3:6379,redis-cluster-node-4:6379,redis-cluster-node-5:6379,redis-cluster-node-6:6379}
  REDIS_CLUSTER_MAX_REDIRECTS: ${REDIS_CLUSTER_MAX_REDIRECTS:-5}
  CHAT_REDIS_ADMISSION_KEY_PREFIX: ${CHAT_REDIS_ADMISSION_KEY_PREFIX:-chat:admission:room:}
  CHAT_REDIS_ADMISSION_RATE_LIMIT_WINDOW_TTL: ${CHAT_REDIS_ADMISSION_RATE_LIMIT_WINDOW_TTL:-2s}
  CHAT_CACHE_ROOM_ADMISSION_POLICIES_TTL: ${CHAT_CACHE_ROOM_ADMISSION_POLICIES_TTL:-10s}
  CHAT_WORKER_ROOM_POLICY_POLL_DELAY_MILLIS: ${CHAT_WORKER_ROOM_POLICY_POLL_DELAY_MILLIS:-1000}
  CHAT_ROOM_POLICY_HOT_MESSAGES_PER_SECOND: ${CHAT_ROOM_POLICY_HOT_MESSAGES_PER_SECOND:-1000}
  CHAT_ROOM_POLICY_VERY_HOT_MESSAGES_PER_SECOND: ${CHAT_ROOM_POLICY_VERY_HOT_MESSAGES_PER_SECOND:-5000}
  CHAT_ROOM_POLICY_OVERLOAD_WRITER_LAG_MILLIS: ${CHAT_ROOM_POLICY_OVERLOAD_WRITER_LAG_MILLIS:-3000}
  CHAT_ROOM_POLICY_OVERLOAD_FANOUT_LAG_MILLIS: ${CHAT_ROOM_POLICY_OVERLOAD_FANOUT_LAG_MILLIS:-3000}
  CHAT_ROOM_POLICY_OVERLOAD_GATEWAY_QUEUE_DEPTH: ${CHAT_ROOM_POLICY_OVERLOAD_GATEWAY_QUEUE_DEPTH:-128}
  CHAT_ROOM_POLICY_NORMAL_LIVE_FEED_MAX_MESSAGES: ${CHAT_ROOM_POLICY_NORMAL_LIVE_FEED_MAX_MESSAGES:-1000}
  CHAT_ROOM_POLICY_NORMAL_LIVE_FEED_MAX_AGE_SECONDS: ${CHAT_ROOM_POLICY_NORMAL_LIVE_FEED_MAX_AGE_SECONDS:-60}
  CHAT_ROOM_POLICY_VERY_HOT_LIVE_FEED_MAX_MESSAGES: ${CHAT_ROOM_POLICY_VERY_HOT_LIVE_FEED_MAX_MESSAGES:-500}
  CHAT_ROOM_POLICY_VERY_HOT_LIVE_FEED_MAX_AGE_SECONDS: ${CHAT_ROOM_POLICY_VERY_HOT_LIVE_FEED_MAX_AGE_SECONDS:-30}
  CHAT_ROOM_POLICY_OVERLOAD_LIVE_FEED_MAX_MESSAGES: ${CHAT_ROOM_POLICY_OVERLOAD_LIVE_FEED_MAX_MESSAGES:-300}
  CHAT_ROOM_POLICY_OVERLOAD_LIVE_FEED_MAX_AGE_SECONDS: ${CHAT_ROOM_POLICY_OVERLOAD_LIVE_FEED_MAX_AGE_SECONDS:-15}
  CHAT_ROOM_POLICY_VERY_HOT_ROOM_RATE_LIMIT_PER_SECOND: ${CHAT_ROOM_POLICY_VERY_HOT_ROOM_RATE_LIMIT_PER_SECOND:-5000}
  CHAT_ROOM_POLICY_OVERLOAD_ROOM_RATE_LIMIT_PER_SECOND: ${CHAT_ROOM_POLICY_OVERLOAD_ROOM_RATE_LIMIT_PER_SECOND:-1000}
  CHAT_ROOM_POLICY_HOT_SLOW_MODE_SECONDS: ${CHAT_ROOM_POLICY_HOT_SLOW_MODE_SECONDS:-1}
  CHAT_ROOM_POLICY_VERY_HOT_SLOW_MODE_SECONDS: ${CHAT_ROOM_POLICY_VERY_HOT_SLOW_MODE_SECONDS:-1}
  CHAT_ROOM_POLICY_OVERLOAD_SLOW_MODE_SECONDS: ${CHAT_ROOM_POLICY_OVERLOAD_SLOW_MODE_SECONDS:-3}
  CHAT_ROOM_POLICY_TRAFFIC_KEY_PREFIX: ${CHAT_ROOM_POLICY_TRAFFIC_KEY_PREFIX:-chat:room-traffic:}
  CHAT_ROOM_POLICY_ACTIVE_ROOMS_KEY: ${CHAT_ROOM_POLICY_ACTIVE_ROOMS_KEY:-chat:room-traffic:active-rooms}
  CHAT_ROOM_POLICY_TRAFFIC_WINDOW_SECONDS: ${CHAT_ROOM_POLICY_TRAFFIC_WINDOW_SECONDS:-60}
  CHAT_ROOM_POLICY_TRAFFIC_COUNTER_TTL_SECONDS: ${CHAT_ROOM_POLICY_TRAFFIC_COUNTER_TTL_SECONDS:-120}
  CHAT_ADMIN_TOKEN: ${CHAT_ADMIN_TOKEN:?CHAT_ADMIN_TOKEN is required}
  CHAT_ADMIN_EXPORT_DIRECTORY: ${CHAT_ADMIN_EXPORT_DIRECTORY:-/tmp/chat-admin-exports}
  CHAT_OBJECT_STORAGE_ENABLED: ${CHAT_OBJECT_STORAGE_ENABLED:-true}
  CHAT_OBJECT_STORAGE_ENDPOINT: ${CHAT_OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
  CHAT_OBJECT_STORAGE_REGION: ${CHAT_OBJECT_STORAGE_REGION:-us-east-1}
  CHAT_OBJECT_STORAGE_BUCKET: ${CHAT_OBJECT_STORAGE_BUCKET:-chat-archives}
  CHAT_OBJECT_STORAGE_ACCESS_KEY: ${CHAT_OBJECT_STORAGE_ACCESS_KEY:-chatminio}
  CHAT_OBJECT_STORAGE_SECRET_KEY: ${CHAT_OBJECT_STORAGE_SECRET_KEY:-chatminiosecret}
  CHAT_OBJECT_STORAGE_PATH_STYLE_ACCESS: ${CHAT_OBJECT_STORAGE_PATH_STYLE_ACCESS:-true}
  CHAT_OBJECT_STORAGE_ADMIN_EXPORT_PREFIX: ${CHAT_OBJECT_STORAGE_ADMIN_EXPORT_PREFIX:-admin-exports}
  CHAT_OBJECT_STORAGE_PRESIGNED_URL_TTL: ${CHAT_OBJECT_STORAGE_PRESIGNED_URL_TTL:-15m}

x-chat-app-healthcheck: &chat-app-healthcheck
  test: [ "CMD-SHELL", "curl -f http://localhost:$${SERVER_PORT:-8080}$${SERVER_CONTEXT_PATH:-/api}/actuator/health" ]
  interval: ${CHAT_APP_HEALTHCHECK_INTERVAL:-30s}
  timeout: ${CHAT_APP_HEALTHCHECK_TIMEOUT:-10s}
  retries: ${CHAT_APP_HEALTHCHECK_RETRIES:-3}
  start_period: ${CHAT_APP_HEALTHCHECK_START_PERIOD:-40s}

services:
  # PostgreSQL 데이터베이스 (공유)
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17.9-alpine}
    container_name: chat-postgres
    command:
      [
        "postgres",
        "-c", "timezone=${DB_TIMEZONE:-Asia/Seoul}",
        "-c", "wal_level=replica",
        "-c", "max_wal_senders=${POSTGRES_MAX_WAL_SENDERS:-10}",
        "-c", "max_replication_slots=${POSTGRES_MAX_REPLICATION_SLOTS:-10}",
        "-c", "wal_keep_size=${POSTGRES_WAL_KEEP_SIZE:-512MB}",
        "-c", "hot_standby=on",
        "-c", "hba_file=/etc/postgresql/pg_hba.conf"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PGTZ: ${DB_TIMEZONE:-Asia/Seoul}
      POSTGRES_DB: ${DB_NAME:-chatdb}
      POSTGRES_USER: ${DB_USERNAME:-chatuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chatpass}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---auth-host=scram-sha-256}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-chat_replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicatorpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./infra/postgres/primary/init-replication.sh:/docker-entrypoint-initdb.d/02-init-replication.sh:ro
      - ./infra/postgres/message-partitions.sql:/docker-entrypoint-initdb.d/03-message-partitions.sql:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chatuser} -d ${DB_NAME:-chatdb}" ]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  # 기존 로컬 볼륨에서도 replication role/conf reload를 보장하는 one-shot setup
  postgres-primary-setup:
    image: ${POSTGRES_IMAGE:-postgres:17.9-alpine}
    container_name: chat-postgres-primary-setup
    entrypoint: [ "/bin/sh", "/usr/local/bin/configure-primary.sh" ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PGPASSWORD: ${DB_PASSWORD:-chatpass}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-chatdb}
      DB_USERNAME: ${DB_USERNAME:-chatuser}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-chat_replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicatorpass}
    volumes:
      - ./infra/postgres/primary/configure-primary.sh:/usr/local/bin/configure-primary.sh:ro
      - ./infra/postgres/message-partitions.sql:/sql/message-partitions.sql:ro
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - chat-network

  # PostgreSQL 읽기 복제본 (로컬 read-replica 검증용)
  postgres-replica:
    image: ${POSTGRES_IMAGE:-postgres:17.9-alpine}
    container_name: chat-postgres-replica
    entrypoint: [ "/bin/sh", "/usr/local/bin/bootstrap-replica.sh" ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PGTZ: ${DB_TIMEZONE:-Asia/Seoul}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Seoul}
      POSTGRES_PRIMARY_HOST: postgres
      POSTGRES_PRIMARY_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${DB_NAME:-chatdb}
      POSTGRES_USER: ${DB_USERNAME:-chatuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chatpass}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-chat_replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicatorpass}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica/bootstrap-replica.sh:/usr/local/bin/bootstrap-replica.sh:ro
    ports:
      - "${DB_REPLICA_HOST_PORT:-5433}:5432"
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chatuser} -d ${DB_NAME:-chatdb}" ]
      interval: ${POSTGRES_REPLICA_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_REPLICA_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_REPLICA_HEALTHCHECK_RETRIES:-10}
    networks:
      - chat-network

  # S3 호환 Object Storage (admin export / cold archive)
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: chat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatminiosecret}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready" ]
      interval: ${MINIO_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${MINIO_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${MINIO_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-04-16T18-13-26Z}
    container_name: chat-minio-init
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - >
        mc alias set chat-minio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "chat-minio/$${CHAT_OBJECT_STORAGE_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatminiosecret}
      CHAT_OBJECT_STORAGE_BUCKET: ${CHAT_OBJECT_STORAGE_BUCKET:-chat-archives}
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - chat-network

  # 오래된 메시지 파티션 아카이브 워커 (기본 보관 기간: 100일)
  postgres-partition-archive:
    image: ${POSTGRES_IMAGE:-postgres:17.9-alpine}
    container_name: chat-postgres-partition-archive
    entrypoint: [ "/bin/sh", "/usr/local/bin/archive-partitions.sh" ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PGPASSWORD: ${DB_PASSWORD:-chatpass}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-chatdb}
      DB_USERNAME: ${DB_USERNAME:-chatuser}
      CHAT_MESSAGE_RETENTION_DAYS: ${CHAT_MESSAGE_RETENTION_DAYS:-100}
      CHAT_MESSAGE_HASH_PARTITIONS: ${CHAT_MESSAGE_HASH_PARTITIONS:-16}
      CHAT_PARTITION_ARCHIVE_DIR: /archive
      CHAT_PARTITION_ARCHIVE_DROP_AFTER_COPY: ${CHAT_PARTITION_ARCHIVE_DROP_AFTER_COPY:-false}
      CHAT_PARTITION_ARCHIVE_RUN_ONCE: ${CHAT_PARTITION_ARCHIVE_RUN_ONCE:-false}
      CHAT_PARTITION_ARCHIVE_INTERVAL_SECONDS: ${CHAT_PARTITION_ARCHIVE_INTERVAL_SECONDS:-86400}
    volumes:
      - postgres_partition_archive:/archive
      - ./infra/postgres/archive/archive-partitions.sh:/usr/local/bin/archive-partitions.sh:ro
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - chat-network

  # Redis 메시지 브로커 (호스트 Gradle 개발 모드 전용 standalone)
  redis:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis
    profiles: [ "dev" ]
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  # Redis Cluster HA (전체 Docker 백엔드 기본값)
  redis-cluster-node-1:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-1
    hostname: redis-cluster-node-1
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-1",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_1_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_1_HOST_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  redis-cluster-node-2:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-2
    hostname: redis-cluster-node-2
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-2",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_2_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_2_HOST_PORT:-6380}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  redis-cluster-node-3:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-3
    hostname: redis-cluster-node-3
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-3",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_3_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_3_HOST_PORT:-6381}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  redis-cluster-node-4:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-4
    hostname: redis-cluster-node-4
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-4",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_4_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_4_HOST_PORT:-6382}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  redis-cluster-node-5:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-5
    hostname: redis-cluster-node-5
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-5",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_5_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_5_HOST_PORT:-6383}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  redis-cluster-node-6:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-node-6
    hostname: redis-cluster-node-6
    profiles: [ "cluster" ]
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis-cluster.conf",
        "--cluster-announce-hostname", "redis-cluster-node-6",
        "--cluster-announce-port", "6379",
        "--cluster-announce-bus-port", "16379"
      ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - redis_cluster_node_6_data:/data
      - ./infra/redis/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    ports:
      - "127.0.0.1:${REDIS_CLUSTER_NODE_6_HOST_PORT:-6384}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
    networks:
      - chat-network

  # redis-cluster-init runs redis-cli --cluster create via infra/redis/create-cluster.sh.
  redis-cluster-init:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: chat-redis-cluster-init
    profiles: [ "cluster" ]
    entrypoint: [ "/bin/sh", "/usr/local/bin/create-cluster.sh" ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-redis-cluster-node-1:6379,redis-cluster-node-2:6379,redis-cluster-node-3:6379,redis-cluster-node-4:6379,redis-cluster-node-5:6379,redis-cluster-node-6:6379}
      REDIS_CLUSTER_BOOTSTRAP_TIMEOUT_SECONDS: ${REDIS_CLUSTER_BOOTSTRAP_TIMEOUT_SECONDS:-90}
    volumes:
      - ./infra/redis/create-cluster.sh:/usr/local/bin/create-cluster.sh:ro
    depends_on:
      redis-cluster-node-1: { condition: service_healthy }
      redis-cluster-node-2: { condition: service_healthy }
      redis-cluster-node-3: { condition: service_healthy }
      redis-cluster-node-4: { condition: service_healthy }
      redis-cluster-node-5: { condition: service_healthy }
      redis-cluster-node-6: { condition: service_healthy }
    networks:
      - chat-network

  chat-api-app-1:
    image: ${CHAT_API_IMAGE:-chatting-service-chat-api-application:local}
    profiles: [ "cluster" ]
    build:
      context: .
      args:
        APP_PORT: ${SERVER_PORT:-8080}
        APP_MODULE: chat-api-application
    container_name: chat-api-app-1
    hostname: chat-api-app-1
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-api-application
      APP_ROLE: api
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      redis-cluster-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  chat-api-app-2:
    image: ${CHAT_API_IMAGE:-chatting-service-chat-api-application:local}
    profiles: [ "cluster" ]
    container_name: chat-api-app-2
    hostname: chat-api-app-2
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-api-application
      APP_ROLE: api
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      redis-cluster-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  chat-websocket-app-1:
    image: ${CHAT_WEBSOCKET_IMAGE:-chatting-service-chat-websocket-application:local}
    profiles: [ "cluster" ]
    build:
      context: .
      args:
        APP_PORT: ${SERVER_PORT:-8080}
        APP_MODULE: chat-websocket-application
    container_name: chat-websocket-app-1
    hostname: chat-websocket-app-1
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-websocket-application
      APP_ROLE: websocket
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      redis-cluster-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  chat-websocket-app-2:
    image: ${CHAT_WEBSOCKET_IMAGE:-chatting-service-chat-websocket-application:local}
    profiles: [ "cluster" ]
    container_name: chat-websocket-app-2
    hostname: chat-websocket-app-2
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-websocket-application
      APP_ROLE: websocket
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      redis-cluster-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  chat-worker-app-1:
    image: ${CHAT_WORKER_IMAGE:-chatting-service-chat-worker-application:local}
    profiles: [ "cluster" ]
    build:
      context: .
      args:
        APP_PORT: ${SERVER_PORT:-8080}
        APP_MODULE: chat-worker-application
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-worker-application
      APP_ROLE: worker
      WORKER_ROLES: ${WORKER_ROLES:-message-writer,fanout,admin-export,room-policy}
      CHAT_WORKER_FANOUT_OWNER_LEASE_ENABLED: ${CHAT_WORKER_FANOUT_OWNER_LEASE_ENABLED:-true}
      CHAT_WORKER_FANOUT_OWNER_LEASE_TTL_MILLIS: ${CHAT_WORKER_FANOUT_OWNER_LEASE_TTL_MILLIS:-10000}
      CHAT_WORKER_FANOUT_OWNER_LEASE_RENEW_INTERVAL_MILLIS: ${CHAT_WORKER_FANOUT_OWNER_LEASE_RENEW_INTERVAL_MILLIS:-3000}
      CHAT_WORKER_FANOUT_OWNER_LEASE_KEY_PREFIX: ${CHAT_WORKER_FANOUT_OWNER_LEASE_KEY_PREFIX:-chat:fanout:owner:room:}
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      redis-cluster-init: { condition: service_completed_successfully }
      minio-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  chat-admin-app-1:
    image: ${CHAT_ADMIN_IMAGE:-chatting-service-chat-admin-application:local}
    profiles: [ "cluster" ]
    build:
      context: .
      args:
        APP_PORT: ${SERVER_PORT:-8080}
        APP_MODULE: chat-admin-application
    container_name: chat-admin-app-1
    hostname: chat-admin-app-1
    environment:
      <<: *chat-app-environment
      SPRING_APPLICATION_NAME: chat-admin-application
      APP_ROLE: admin
    depends_on:
      postgres-primary-setup: { condition: service_completed_successfully }
      postgres-replica: { condition: service_healthy }
      redis-cluster-init: { condition: service_completed_successfully }
      minio-init: { condition: service_completed_successfully }
    healthcheck: *chat-app-healthcheck
    networks:
      - chat-network

  # Prometheus (metric 수집)
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.53.0}
    profiles: [ "cluster" ]
    container_name: chat-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      # 호스트 로컬에만 바인딩한다. 외부 공개는 K8s에서 인증된 Ingress로 다룬다.
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - chat-network

  # Grafana (dashboard)
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.5.2}
    profiles: [ "cluster" ]
    container_name: chat-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # 호스트 로컬에만 바인딩한다. 외부 공개는 K8s에서 인증된 Ingress로 다룬다.
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - chat-network

  # Nginx
  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    profiles: [ "cluster" ]
    container_name: chat-nginx
    environment:
      TZ: ${TZ:-Asia/Seoul}
      CHAT_BACKEND_PORT: ${SERVER_PORT:-8080}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - chat-api-app-1
      - chat-api-app-2
      - chat-websocket-app-1
      - chat-websocket-app-2
      - chat-admin-app-1
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: ${NGINX_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${NGINX_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${NGINX_HEALTHCHECK_RETRIES:-3}
    networks:
      - chat-network

  # Nginx (로컬 개발용) - 백엔드를 호스트 gradle bootRun으로 띄우는 dev 모드 전용.
  # upstream이 host.docker.internal:8080~8082(호스트 포트)를 가리킨다.
  # profiles로 격리해 일반 `docker compose up`(전체 클러스터)에서는 기동되지 않는다.
  nginx-dev:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: chat-nginx-dev
    profiles: [ "dev" ]
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: ${NGINX_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${NGINX_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${NGINX_HEALTHCHECK_RETRIES:-3}


# 볼륨 정의
volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  postgres_partition_archive:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  redis_cluster_node_1_data:
    driver: local
  redis_cluster_node_2_data:
    driver: local
  redis_cluster_node_3_data:
    driver: local
  redis_cluster_node_4_data:
    driver: local
  redis_cluster_node_5_data:
    driver: local
  redis_cluster_node_6_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# 네트워크 정의
networks:
  chat-network:
    driver: bridge
